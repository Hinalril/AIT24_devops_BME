global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: linux
    static_configs:
      - targets:
          - 192.168.77.11:9100
          - 192.168.77.12:9100
          - 192.168.77.13:9100
          - 192.168.77.20:9100

  - job_name: postgresql
    static_configs:
      - targets:
          - 192.168.77.11:9187
          - 192.168.77.12:9187
          - 192.168.77.13:9187

---

- name: Initialize and configure PostgreSQL
  hosts: postgresql
  become: true
  gather_facts: false

  vars:
    firewall_rule: >-
      rule family="ipv4"
      source address="{{ lab_network }}"
      port port="{{ postgresql_port }}" protocol="tcp" accept

  tasks:
    - name: Validate PostgreSQL variables
      ansible.builtin.assert:
        that:
          - postgresql_data_dir is defined
          - postgresql_service_name is defined
          - postgresql_bin_dir is defined
          - postgresql_listen_addresses is defined
          - postgresql_password_encryption is defined
          - postgresql_port is defined
          - lab_network is defined
        fail_msg: >-
          Required PostgreSQL variables are missing for
          {{ inventory_hostname }}.

    - name: Ensure PostgreSQL data directory permissions
      ansible.builtin.file:
        path: "{{ postgresql_data_dir }}"
        state: directory
        owner: postgres
        group: postgres
        mode: "0700"

    - name: Initialize PostgreSQL cluster with checksums
      ansible.builtin.command:
        argv:
          - "{{ postgresql_bin_dir }}/initdb"
          - --data-checksums
          - --auth-local=peer
          - --auth-host=scram-sha-256
          - -D
          - "{{ postgresql_data_dir }}"
        creates: "{{ postgresql_data_dir }}/PG_VERSION"
      become_user: postgres

    - name: Configure PostgreSQL listen addresses
      ansible.builtin.lineinfile:
        path: "{{ postgresql_data_dir }}/postgresql.conf"
        regexp: '^#?listen_addresses\s*='
        line: >-
          listen_addresses = '{{ postgresql_listen_addresses }}'
      notify: Restart PostgreSQL

    - name: Configure password encryption
      ansible.builtin.lineinfile:
        path: "{{ postgresql_data_dir }}/postgresql.conf"
        regexp: '^#?password_encryption\s*='
        line: >-
          password_encryption = '{{ postgresql_password_encryption }}'
      notify: Restart PostgreSQL

    - name: Allow remote access from laboratory network
      ansible.builtin.blockinfile:
        path: "{{ postgresql_data_dir }}/pg_hba.conf"
        marker: "# {mark} ANSIBLE REMOTE ACCESS"
        block: |
          host    all    all    {{ lab_network }}    {{ postgresql_password_encryption }}
      notify: Restart PostgreSQL

    - name: Enable and start firewalld
      ansible.builtin.service:
        name: firewalld
        enabled: true
        state: started

    - name: Allow PostgreSQL through firewall
      ansible.builtin.command:
        argv:
          - firewall-cmd
          - --permanent
          - "--add-rich-rule={{ firewall_rule }}"
      register: firewall_result
      changed_when: >-
        'ALREADY_ENABLED' not in
        (firewall_result.stdout + firewall_result.stderr)
      notify: Reload firewalld

    - name: Enable and start PostgreSQL
      ansible.builtin.service:
        name: "{{ postgresql_service_name }}"
        enabled: true
        state: started

    - name: Apply configuration changes
      ansible.builtin.meta: flush_handlers

    - name: Read checksum status
      ansible.builtin.command:
        argv:
          - "{{ postgresql_bin_dir }}/psql"
          - -tAc
          - SHOW data_checksums;
      become_user: postgres
      register: checksum_status
      changed_when: false

    - name: Verify data checksums
      ansible.builtin.assert:
        that:
          - checksum_status.stdout | trim == "on"
        success_msg: PostgreSQL data checksums are enabled.

    - name: Check PostgreSQL readiness
      ansible.builtin.command:
        argv:
          - "{{ postgresql_bin_dir }}/pg_isready"
          - -h
          - 127.0.0.1
          - -p
          - "{{ postgresql_port }}"
      register: readiness
      changed_when: false

    - name: Show verification results
      ansible.builtin.debug:
        msg:
          - "Data checksums: {{ checksum_status.stdout | trim }}"
          - "{{ readiness.stdout }}"

  handlers:
    - name: Restart PostgreSQL
      ansible.builtin.service:
        name: "{{ postgresql_service_name }}"
        state: restarted

    - name: Reload firewalld
      ansible.builtin.command:
        argv:
          - firewall-cmd
          - --reload